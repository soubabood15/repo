<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Service Knowledge Base</title>

<style>
  body {
    margin: 0;
    min-height: 100vh;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #f7fbff, #eef5ff);
    color: #285eff;
  }

  body.night-mode {
    background: linear-gradient(135deg, #0f172a, #172554, #020617);
    color: #dbeafe;
  }

  .sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0,0,0,0);
  white-space: nowrap;
  border: 0;
}

  .theme-toggle {
    position: fixed;
    top: 18px;
    left: 22px;
    z-index: 9998;
    border: 2px solid rgba(40, 94, 255, 0.22);
    border-radius: 999px;
    padding: 11px 18px;
    background: rgba(255,255,255,0.78);
    color: #1d2b5c;
    font-size: 14px;
    font-weight: 900;
    cursor: pointer;
    box-shadow: 0 8px 22px rgba(40, 94, 255, 0.16);
    backdrop-filter: blur(14px);
    transition: 0.25s ease;
  }

  .watermark {
    position: fixed;
    bottom: 16px;
    left: 18px;
    z-index: 9998;
    padding: 8px 12px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.54);
    border: 1px solid rgba(40, 94, 255, 0.14);
    color: rgba(53, 68, 123, 0.86);
    font-size: 11px;
    font-weight: 850;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 20px rgba(40, 94, 255, 0.055);
    opacity: 0.72;
    pointer-events: none;
  }

  .agent-screen-watermark {
    position: fixed;
    inset: 0;
    z-index: 12000;
    pointer-events: none;
    opacity: 0;
    overflow: hidden;
    display: none;
  }

  .agent-screen-watermark.active {
    display: block;
    opacity: 1;
  }

  .agent-screen-watermark::before {
    content: attr(data-watermark);
    position: absolute;
    inset: -260px;
    color: rgba(29, 43, 92, 0.055);
    font-size: 15px;
    font-weight: 850;
    line-height: 92px;
    letter-spacing: 0.4px;
    transform: rotate(-28deg);
    white-space: pre-wrap;
    word-spacing: 54px;
    text-shadow: none;
  }

  body.night-mode .agent-screen-watermark::before {
    color: rgba(219, 234, 254, 0.07);
    text-shadow: none;
  }

  body.night-mode .watermark {
    background: rgba(15, 23, 42, 0.48);
    color: rgba(219, 234, 254, 0.78);
    border-color: rgba(147, 197, 253, 0.18);
  }

  .theme-toggle:hover {
    transform: translateY(-2px);
    background: rgba(255,255,255,0.95);
  }

  .online-toggle {
    position: fixed;
    top: 18px;
    left: 96px;
    z-index: 9998;
    border: 2px solid rgba(16, 185, 129, 0.22);
    border-radius: 999px;
    padding: 11px 16px;
    background: rgba(255,255,255,0.78);
    color: #059669;
    font-size: 14px;
    font-weight: 950;
    cursor: pointer;
    box-shadow: 0 8px 22px rgba(16, 185, 129, 0.14);
    backdrop-filter: blur(14px);
    transition: 0.25s ease;
  }

  .online-toggle:hover {
    transform: translateY(-2px);
    background: rgba(255,255,255,0.95);
  }

  body.night-mode .online-toggle {
    background: rgba(15, 23, 42, 0.82);
    color: #bbf7d0;
    border-color: rgba(74, 222, 128, 0.32);
  }

  body.night-mode .theme-toggle {
    background: rgba(15, 23, 42, 0.82);
    color: #dbeafe;
    border-color: rgba(147, 197, 253, 0.35);
  }

  body.night-mode .search-box input,
  body.night-mode .section,
  body.night-mode .action-btn,
  body.night-mode .group-items,
  body.night-mode .empty-state,
  body.night-mode .no-results {
    background: rgba(15, 23, 42, 0.62);
    color: #dbeafe;
    border-color: rgba(147, 197, 253, 0.22);
  }

  body.night-mode .search-box.open input,
  body.night-mode .search-box.open input:focus {
    background: rgba(15, 23, 42, 0.78);
    color: #dbeafe;
    border-color: rgba(147, 197, 253, 0.38);
    box-shadow: 0 12px 30px rgba(2, 6, 23, 0.45);
  }

  body.night-mode .section h2 {
    color: #dbeafe;
    background: rgba(96, 165, 250, 0.16);
    border-color: rgba(147, 197, 253, 0.28);
  }

  body.night-mode .group-btn {
    color: #dbeafe;
  }

  body.night-mode .popup-box {
    background: rgba(15, 23, 42, 0.96);
  }

  body.night-mode .popup-header {
    background: linear-gradient(135deg, rgba(15, 23, 42, 0.98), rgba(30, 41, 59, 0.94));
    border-bottom-color: rgba(147, 197, 253, 0.18);
  }

  body.night-mode .popup-title,
  body.night-mode .info-card-title {
    color: #93c5fd;
  }

  body.night-mode .info-card,
  body.night-mode .popup-image-box {
    background: rgba(30, 41, 59, 0.82);
    color: #dbeafe;
    border-color: rgba(147, 197, 253, 0.18);
  }

  body.night-mode .reply-card {
    background: rgba(6, 78, 59, 0.5);
  }

  .agent-login-overlay {
    position: fixed;
    inset: 0;
    z-index: 10000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 22px;
    background: rgba(15, 23, 42, 0.56);
    backdrop-filter: blur(12px);
  }

  .agent-login-overlay.show {
    display: flex;
  }

  .agent-login-box {
    width: min(420px, 100%);
    background: rgba(255, 255, 255, 0.94);
    border: 1px solid rgba(40, 94, 255, 0.18);
    border-radius: 24px;
    padding: 26px;
    box-shadow: 0 24px 70px rgba(15, 23, 42, 0.28);
    text-align: center;
  }

  .agent-login-box h2 {
    margin: 0 0 10px;
    color: #1f4eff;
    font-size: 25px;
    font-weight: 950;
  }

  .agent-login-box p {
    margin: 0 0 18px;
    color: #1e293b;
    font-size: 14px;
    font-weight: 800;
  }

  .agent-login-box input {
    width: 100%;
    border: 2px solid rgba(40, 94, 255, 0.18);
    border-radius: 16px;
    padding: 14px;
    box-sizing: border-box;
    outline: none;
    font-family: inherit;
    font-size: 15px;
    font-weight: 850;
    color: #1d2b5c;
    background: rgba(255,255,255,0.86);
    text-align: center;
    margin-top: 10px;
  }

  .agent-login-box button {
    width: 100%;
    margin-top: 13px;
    border: none;
    border-radius: 16px;
    padding: 13px;
    background: linear-gradient(135deg, #285eff, #1d4ed8);
    color: white;
    font-size: 15px;
    font-weight: 950;
    cursor: pointer;
    transition: 0.22s ease;
  }

  .agent-login-box button:hover {
    transform: translateY(-2px);
    box-shadow: 0 14px 28px rgba(40, 94, 255, 0.22);
  }

  .agent-login-box button:disabled {
    opacity: 0.72;
    cursor: not-allowed;
    transform: none;
  }

  .login-error {
    display: none;
    margin-top: 12px;
    color: #dc2626;
    font-size: 13px;
    font-weight: 900;
  }

  .login-error.show {
    display: block;
  }

  .agent-name-display {
    position: fixed;
    top: 66px;
    right: 22px;
    z-index: 9998;
    padding: 9px 15px;
    border-radius: 999px;
    background: rgba(255,255,255,0.65);
    border: 1px solid rgba(40, 94, 255, 0.18);
    color: #1d2b5c;
    font-size: 12px;
    font-weight: 900;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 22px rgba(40,94,255,0.10);
    min-width: 160px;
    text-align: center;
    white-space: nowrap;
  }

  .agent-name-display.typing::after {
    content: "|";
    margin-right: 3px;
    animation: typingCursor 0.75s infinite;
  }

  .agent-live-panel {
    position: fixed;
    top: 68px;
    left: 96px;
    right: auto;
    z-index: 9998;
    width: 250px;
    padding: 16px;
    border-radius: 24px;
    background: linear-gradient(145deg, rgba(255,255,255,0.92), rgba(238,245,255,0.82));
    border: 1px solid rgba(40, 94, 255, 0.18);
    color: #1d2b5c;
    box-shadow: 0 18px 46px rgba(40,94,255,0.18);
    backdrop-filter: blur(16px);
    display: flex;
    gap: 12px;
    flex-direction: column;
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    transform: translateY(-10px) scale(0.96);
    transform-origin: top left;
    transition: opacity 0.22s ease, transform 0.22s ease, visibility 0.22s ease;
  }

  .agent-live-panel.show {
    opacity: 1;
    visibility: visible;
    pointer-events: auto;
    transform: translateY(0) scale(1);
    animation: onlinePanelDrop 0.28s ease;
  }

  @keyframes onlinePanelDrop {
    0% {
      opacity: 0;
      transform: translateY(-12px) scale(0.94);
    }
    70% {
      opacity: 1;
      transform: translateY(3px) scale(1.01);
    }
    100% {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  .agent-live-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(40, 94, 255, 0.12);
  }

  .agent-live-title {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .agent-live-title strong {
    color: #1f4eff;
    font-size: 14px;
    font-weight: 950;
  }

  .agent-live-title small {
    color: #334155;
    font-size: 11px;
    font-weight: 900;
  }

  .agent-logout-btn {
    border: none;
    border-radius: 999px;
    padding: 8px 10px;
    background: rgba(15, 23, 42, 0.08);
    color: #1d2b5c;
    font-size: 11px;
    font-weight: 950;
    cursor: pointer;
    transition: 0.2s ease;
  }

  .agent-logout-btn:hover {
    transform: translateY(-2px);
    background: rgba(239, 68, 68, 0.12);
    color: #dc2626;
  }

  .agent-live-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    font-size: 12px;
    font-weight: 950;
    padding: 10px 12px;
    border-radius: 16px;
    background: rgba(255,255,255,0.62);
    border: 1px solid rgba(40, 94, 255, 0.10);
  }

  .agent-live-status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: #059669;
  }

  .agent-live-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: #10b981;
    box-shadow: 0 0 0 6px rgba(16, 185, 129, 0.12);
  }

  .agent-live-time {
    color: #1f4eff;
    font-size: 13px;
    font-weight: 950;
  }

  .agent-live-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .agent-online-btn,
  .agent-offline-btn {
    border: none;
    border-radius: 999px;
    padding: 9px 12px;
    font-size: 12px;
    font-weight: 950;
    cursor: pointer;
    transition: 0.2s ease;
  }

  .agent-online-btn {
    background: rgba(16, 185, 129, 0.13);
    color: #059669;
  }

  .agent-offline-btn {
    background: rgba(239, 68, 68, 0.12);
    color: #dc2626;
  }

  .agent-online-btn:hover,
  .agent-offline-btn:hover {
    transform: translateY(-2px);
  }

  .agent-online-btn:hover {
    background: rgba(16, 185, 129, 0.22);
  }

  .agent-offline-btn:hover {
    background: rgba(239, 68, 68, 0.2);
  }

  .agent-online-btn:disabled,
  .agent-offline-btn:disabled {
    opacity: 0.55;
    cursor: not-allowed;
    transform: none;
  }

  @keyframes typingCursor {
    0%, 45% { opacity: 1; }
    46%, 100% { opacity: 0; }
  }

body.night-mode .agent-login-box,
body.night-mode .agent-name-display,
body.night-mode .agent-live-panel {
    background: rgba(15, 23, 42, 0.86);
    color: #dbeafe;
    border-color: rgba(147, 197, 253, 0.22);
  }

  body.night-mode .agent-login-box h2 {
    color: #93c5fd;
  }

  body.night-mode .agent-login-box p,
  body.night-mode .agent-login-box input {
    color: #dbeafe;
  }

  body.night-mode .agent-login-box input {
    background: rgba(15, 23, 42, 0.72);
    border-color: rgba(147, 197, 253, 0.22);
  }

  .search-wrapper {
    padding: 26px 30px 0;
    box-sizing: border-box;
    position: relative;
    z-index: 2;
  }

  .search-box {
    width: 138px;
    height: 64px;
    margin: 0 auto;
    position: relative;
    transition: width 0.35s ease, transform 0.25s ease;
  }

  .search-box::before {
    content: "🔎";
    position: absolute;
    right: 21px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 2;
    font-size: 20px;
    pointer-events: none;
    filter: drop-shadow(0 4px 8px rgba(40,94,255,0.18));
  }

  .search-box::after {
    content: "";
    position: absolute;
    inset: -5px;
    border-radius: 999px;
    background: linear-gradient(135deg, rgba(40,94,255,0.20), rgba(16,185,129,0.14), rgba(139,92,246,0.16));
    opacity: 0;
    filter: blur(10px);
    transition: 0.3s ease;
    z-index: -1;
  }

  .search-box.open {
    width: min(780px, 100%);
    transform: translateY(-1px);
  }

  .search-box.open::after {
    opacity: 1;
  }

  .search-box input {
    width: 100%;
    height: 64px;
    border: 2px solid rgba(40, 94, 255, 0.18);
    border-radius: 999px;
    padding: 16px 62px 16px 18px;
    font-size: 16px;
    font-weight: 850;
    color: #1d2b5c;
    outline: none;
    background: rgba(255, 255, 255, 0.78);
    box-shadow: 0 12px 32px rgba(40, 94, 255, 0.13);
    backdrop-filter: blur(16px);
    transition: 0.35s ease;
    box-sizing: border-box;
    cursor: pointer;
  }

  .search-box:not(.open) input {
    color: #1d2b5c;
    padding: 16px 22px;
    caret-color: transparent;
    text-align: center;
  }

  .search-box.open input {
    cursor: text;
    color: #1d2b5c;
    caret-color: auto;
    text-align: right;
  }

  .search-box.open input:focus {
    border-color: rgba(16, 185, 129, 0.48);
    background: rgba(255, 255, 255, 0.96);
    box-shadow: 0 16px 36px rgba(16, 185, 129, 0.16), 0 0 0 5px rgba(16, 185, 129, 0.07);
  }


  .search-box:not(.open) input::placeholder {
    color: #1d2b5c;
    opacity: 1;
  }

  .search-box.open input::placeholder {
    color: rgba(29, 43, 92, 0.45);
  }

  body.night-mode .search-box.open input::placeholder {
    color: rgba(219, 234, 254, 0.5);
  }

  body.night-mode .search-box:not(.open) input {
    color: #dbeafe;
  }

  body.night-mode .search-box:not(.open) input::placeholder {
    color: #dbeafe;
  }

  .no-results {
    display: none;
    margin: 12px auto 0;
    width: min(720px, 100%);
    text-align: center;
    color: #1e293b;
    font-weight: 800;
    background: rgba(255,255,255,0.55);
    border: 1px dashed rgba(40, 94, 255, 0.25);
    border-radius: 14px;
    padding: 12px;
  }

  .no-results.show {
    display: block;
  }


  mark.search-highlight {
    background: rgba(250, 204, 21, 0.65);
    color: #1d2b5c;
    padding: 1px 4px;
    border-radius: 6px;
  }

  body.night-mode mark.search-highlight {
    background: rgba(245, 158, 11, 0.8);
    color: #ffffff;
  }

  .top-widgets {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 16px;
    padding: 18px 30px 0;
    box-sizing: border-box;
  }

  .mini-panel {
    background: rgba(255, 255, 255, 0.42);
    border: 1px solid rgba(40, 94, 255, 0.16);
    border-radius: 18px;
    padding: 16px;
    box-shadow: 0 8px 22px rgba(40, 94, 255, 0.09);
    backdrop-filter: blur(14px);
  }

  .mini-panel h3 {
    margin: 0 0 12px;
    color: #1f4eff;
    font-size: 17px;
    font-weight: 900;
  }

  .mini-list {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .mini-chip {
    border: 2px solid rgba(40, 94, 255, 0.18);
    background: rgba(255, 255, 255, 0.66);
    color: #1d2b5c;
    border-radius: 999px;
    padding: 9px 13px;
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
    transition: 0.2s ease;
  }

  .mini-chip:hover {
    transform: translateY(-2px);
    background: rgba(255, 255, 255, 0.95);
  }

  .mini-empty {
    color: #334155;
    font-size: 13px;
    font-weight: 800;
  }

  body.night-mode .mini-panel,
  body.night-mode .mini-chip {
    background: rgba(15, 23, 42, 0.62);
    color: #dbeafe;
    border-color: rgba(147, 197, 253, 0.22);
  }

  body.night-mode .mini-panel h3 {
    color: #93c5fd;
  }

  body.night-mode .mini-empty {
    color: rgba(219, 234, 254, 0.6);
  }

  .case-meta-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 16px;
  }

  .severity-badge,
  .escalation-badge,
  .refund-badge {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 9px 13px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 900;
  }

  .severity-critical {
    background: rgba(127, 29, 29, 0.16);
    color: #7f1d1d;
    border: 1px solid rgba(127, 29, 29, 0.28);
  }

  .severity-high {
    background: rgba(239, 68, 68, 0.14);
    color: #dc2626;
    border: 1px solid rgba(239, 68, 68, 0.24);
  }

  .severity-medium {
    background: rgba(245, 158, 11, 0.15);
    color: #b45309;
    border: 1px solid rgba(245, 158, 11, 0.26);
  }

  .severity-low {
    background: rgba(16, 185, 129, 0.14);
    color: #059669;
    border: 1px solid rgba(16, 185, 129, 0.24);
  }

  .escalation-yes {
    background: rgba(239, 68, 68, 0.12);
    color: #dc2626;
    border: 1px solid rgba(239, 68, 68, 0.22);
  }

  .escalation-no {
    background: rgba(16, 185, 129, 0.12);
    color: #059669;
    border: 1px solid rgba(16, 185, 129, 0.22);
  }

  .refund-yes {
    background: rgba(59, 130, 246, 0.12);
    color: #2563eb;
    border: 1px solid rgba(59, 130, 246, 0.22);
  }

  .refund-no {
    background: rgba(107, 114, 128, 0.12);
    color: #4b5563;
    border: 1px solid rgba(107, 114, 128, 0.22);
  }

  .feedback-row {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 8px;
  }

  .agent-name-card {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .agent-name-input {
    width: 100%;
    border: 1px solid rgba(40, 94, 255, 0.18);
    border-radius: 14px;
    padding: 12px 14px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 800;
    color: #1d2b5c;
    background: rgba(255,255,255,0.78);
    box-sizing: border-box;
    outline: none;
    transition: 0.2s ease;
  }

  .agent-name-input:focus {
    border-color: rgba(40, 94, 255, 0.42);
    box-shadow: 0 8px 20px rgba(40, 94, 255, 0.12);
    background: rgba(255,255,255,0.96);
  }

  .feedback-btn {
    min-width: 132px;
    border: none;
    border-radius: 18px;
    padding: 13px 17px;
    font-size: 14px;
    font-weight: 950;
    cursor: pointer;
    transition: 0.22s ease;
    color: #ffffff;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    box-shadow: 0 10px 22px rgba(15, 23, 42, 0.12);
  }

  .feedback-btn:hover {
    transform: translateY(-3px) scale(1.02);
  }

  .feedback-btn:active {
    transform: translateY(0) scale(0.98);
  }

  .feedback-btn.like {
    background: linear-gradient(135deg, #10b981, #059669);
  }

  .feedback-btn.dislike {
    background: linear-gradient(135deg, #ef4444, #dc2626);
  }

  .reply-copy-text {
    margin-bottom: 10px;
  }

  .copy-reply-btn {
    border: none;
    border-radius: 999px;
    padding: 9px 13px;
    background: #10b981;
    color: #ffffff;
    font-size: 13px;
    font-weight: 950;
    cursor: pointer;
    transition: 0.2s ease;
  }

  .copy-reply-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(16, 185, 129, 0.18);
  }

  .feedback-form {
    display: none;
    flex-direction: column;
    gap: 10px;
    margin-top: 10px;
  }

  .feedback-form.show {
    display: flex;

  const PROJECT_ID = "himma";
  const EBOOK_PAGE = "ebook.html";
  const SUPABASE_URL = "https://estyiinuotsygtrgtezz.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_NB_aYGgJ7o8RB1ddYWSIOA_Gwj39mfs";
  const LAUNCH_TOKEN_TTL = 15000;
  const CHECK_INTERVAL = 5000;
  let projectAccessVerified = false;

  function showGuard(message){
    let overlay = document.getElementById("ebookProjectGuardOverlay");
    if(!overlay){
      overlay = document.createElement("div");
      overlay.id = "ebookProjectGuardOverlay";
      overlay.style.cssText = "position:fixed;inset:0;z-index:2147483647;display:flex;align-items:center;justify-content:center;background:rgba(234,242,250,.97);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);font-family:Arial,sans-serif;opacity:1;transition:opacity .28s ease";
      overlay.innerHTML = '<div style="width:48px;height:48px;border-radius:14px;display:grid;place-items:center;color:white;font-weight:950;background:#0b5f9d;box-shadow:0 12px 30px rgba(7,63,106,.20)">NT</div>';
      document.documentElement.appendChild(overlay);
    }
  }

  function hideGuard(){
    const overlay = document.getElementById("ebookProjectGuardOverlay");
    if(overlay){overlay.style.opacity="0";setTimeout(()=>overlay.remove(),280);}
  }

  function getEbookUser(){
    try{return JSON.parse(localStorage.getItem("ebookUser"));}
    catch(e){return null;}
  }

  function getLaunch(){
    try{return JSON.parse(localStorage.getItem("ebookProjectLaunch"));}
    catch(e){return null;}
  }

  function todayString(){
    return new Date().toISOString().slice(0,10);
  }

  function clearEbookLaunch(){
    localStorage.removeItem("ebookProjectLaunch");
  }

  function goToEbook(message){
    showGuard(message || "Please open this project from the eBook Portal.");
    clearEbookLaunch();
    setTimeout(function(){window.location.href = EBOOK_PAGE;},350);
  }

  function hasFreshLaunch(user){
    const params = new URLSearchParams(window.location.search);
    const launch = getLaunch();
    return Boolean(
      user && user.username &&
      params.get("from") === "ebook" &&
      params.get("project") === PROJECT_ID &&
      launch &&
      launch.source === "ebook" &&
      launch.projectId === PROJECT_ID &&
      launch.username === user.username &&
      (Date.now() - Number(launch.launchedAt || 0)) <= LAUNCH_TOKEN_TTL
    );
  }

  async function supabaseSelect(table,queryString){
    const res = await fetch(SUPABASE_URL + "/rest/v1/" + table + (queryString || ""),{
      method:"GET",
      headers:{
        apikey:SUPABASE_ANON_KEY,
        Authorization:"Bearer " + SUPABASE_ANON_KEY,
        "Content-Type":"application/json"
      }
    });
    if(!res.ok){throw new Error(await res.text());}
    return await res.json();
  }

  async function userHasProjectAccess(user){
    if(String(user?.role || "").toLowerCase() === "admin") return true;
    const rows = await supabaseSelect("ebook_permissions","?select=project_id,is_allowed,expires_at,agent_name&agent_name=eq." + encodeURIComponent(user.username));
    const today = todayString();
    return (rows || []).some(function(row){
      return String(row.project_id || "").toLowerCase() === PROJECT_ID &&
        row.is_allowed === true &&
        (!row.expires_at || row.expires_at >= today);
    });
  }

  async function verifyEntry(){
    showGuard("Checking access...");
    const user = getEbookUser();
    if(!user || !user.username){
      goToEbook("Please sign in from the eBook Portal first.");
      return false;
    }

    try{
      const allowed = await userHasProjectAccess(user);
      if(!allowed){
        goToEbook("Your Himma access is expired or not allowed.");
        return false;
      }
      projectAccessVerified = true;
      clearEbookLaunch();
      history.replaceState(null,"",window.location.pathname);
      hideGuard();
      return true;
    }catch(err){
      console.error("Himma access check failed:",err);
      goToEbook("Unable to verify access. Please sign in again.");
      return false;
    }
  }

  async function watchAccess(){
    const user = getEbookUser();
    if(!projectAccessVerified || !user || !user.username) return;
    try{
      const allowed = await userHasProjectAccess(user);
      if(!allowed){goToEbook("Your Himma access was removed by Admin.");}
    }catch(err){
      console.warn("Himma permission watch failed:",err);
    }
  }

  verifyEntry().then(function(ok){
    if(ok){setInterval(watchAccess,CHECK_INTERVAL);}
  });
})();
</script>

  // --- Supabase: Load cases from Supabase ---
function normalizeKbValue(value) {
  return String(value || '').trim().toLowerCase();
}

function boolToYesNo(value) {
  return value === true || value === 'true' || value === 'Yes' ? 'Yes' : 'No';
}

function getOrCreateSectionElement(sectionName) {
  const cleanSectionName = String(sectionName || 'General').trim() || 'General';
  const normalizedSectionName = normalizeKbValue(cleanSectionName);

  let sectionEl = Array.from(document.querySelectorAll('.section')).find(sec =>
    normalizeKbValue(sec.querySelector('h2')?.textContent) === normalizedSectionName
  );

  if (sectionEl) return sectionEl;

  const mainSections = document.querySelector('.main-sections');
  if (!mainSections) return null;

  sectionEl = document.createElement('div');
  sectionEl.className = 'section';
  sectionEl.dataset.dynamicSection = 'true';

  const h2 = document.createElement('h2');
  h2.textContent = cleanSectionName;

  const emptyBox = document.createElement('div');
  emptyBox.className = 'empty-box';

  sectionEl.appendChild(h2);
  sectionEl.appendChild(emptyBox);
  mainSections.appendChild(sectionEl);

  return sectionEl;
}

function getOrCreateGroupContainer(sectionName, groupName) {
  const sectionEl = getOrCreateSectionElement(sectionName);
  if (!sectionEl) return null;

  const cleanGroupName = String(groupName || 'Ungrouped').trim() || 'Ungrouped';
  const normalizedGroupName = normalizeKbValue(cleanGroupName);
  const sectionEmptyBox = sectionEl.querySelector(':scope > .empty-box');

  if (!sectionEmptyBox) return null;

  let groupBox = Array.from(sectionEmptyBox.querySelectorAll(':scope > .group-box')).find(box =>
    normalizeKbValue(box.querySelector('.group-btn')?.textContent) === normalizedGroupName
  );

  if (groupBox) {
    let groupItems = groupBox.querySelector('.group-items');
    if (!groupItems) {
      groupItems = document.createElement('div');
      groupItems.className = 'group-items';
      groupBox.appendChild(groupItems);
    }
    return groupItems;
  }

  groupBox = document.createElement('div');
  groupBox.className = 'group-box';
  groupBox.dataset.dynamicGroup = 'true';

  const groupButton = document.createElement('button');
  groupButton.className = 'group-btn';
  groupButton.type = 'button';
  groupButton.textContent = cleanGroupName;

  const groupItems = document.createElement('div');
  groupItems.className = 'group-items';

  const emptyState = document.createElement('div');
  emptyState.className = 'empty-state';

  groupItems.appendChild(emptyState);

  groupBox.appendChild(groupButton);
  groupBox.appendChild(groupItems);
  sectionEmptyBox.appendChild(groupBox);

  return groupItems;
}

  let himmaCacheBypassPending=performance.getEntriesByType('navigation')[0]?.type==='reload';
  async function loadCasesFromSupabase() {
    try {
      const cacheKey='newtel_agent_himma_data_cache_v1';
      const reloaded=himmaCacheBypassPending;himmaCacheBypassPending=false;
      let cached=null;
      if(!reloaded){try{const parsed=JSON.parse(localStorage.getItem(cacheKey));if(parsed&&Date.now()-parsed.savedAt<30*60*1000)cached=parsed}catch(error){cached=null}}
      let sectionsData,groupsData,casesData;
      let sectionsError=null,groupsError=null,casesError=null;
      if(cached){sectionsData=cached.sections;groupsData=cached.groups;casesData=cached.cases}
      else{const result=await supabaseClient.from('sections').select('id,name,icon,created_at').order('created_at',{ascending:true});sectionsData=result.data;sectionsError=result.error}

      if (sectionsError) {
        console.error('Supabase SECTIONS SELECT ERROR:', sectionsError);
        alert(`Supabase SECTIONS ERROR: ${sectionsError.message}`);
        return;
      }

      if(!cached){const result=await supabaseClient.from('groups').select('id,section_id,name,created_at').order('created_at',{ascending:true});groupsData=result.data;groupsError=result.error}

      if (groupsError) {
        console.error('Supabase GROUPS SELECT ERROR:', groupsError);
        alert(`Supabase GROUPS ERROR: ${groupsError.message}`);
        return;
      }

      if(!cached){const result=await supabaseClient.from('cases').select('id,group_id,title,description,severity,escalation,refund,img,scripts,created_at').order('created_at',{ascending:false});casesData=result.data;casesError=result.error}

      if (casesError) {
        console.error('Supabase CASES SELECT ERROR:', casesError);
        alert(`Supabase CASES ERROR: ${casesError.message}`);
        return;
      }
      if(!cached)localStorage.setItem(cacheKey,JSON.stringify({savedAt:Date.now(),sections:sectionsData||[],groups:groupsData||[],cases:casesData||[]}));

      console.log('Supabase sections:', sectionsData);
      console.log('Supabase groups:', groupsData);
      console.log('Supabase cases:', casesData);

      resetSupabaseUi();

      const sectionById = new Map();
      const groupById = new Map();

      (sectionsData || []).forEach(sectionItem => {
        sectionById.set(sectionItem.id, sectionItem);
        getOrCreateSectionElement(sectionItem.name || 'General');
      });

      (groupsData || []).forEach(groupItem => {
        const sectionItem = sectionById.get(groupItem.section_id);
        const sectionName = sectionItem?.name || 'General';
        groupById.set(groupItem.id, { ...groupItem, sectionName });
        getOrCreateGroupContainer(sectionName, groupItem.name || 'Ungrouped');
      });

      (casesData || []).forEach(item => {
        const groupItem = groupById.get(item.group_id);
        const sectionName = groupItem?.sectionName || 'General';
        const groupName = groupItem?.name || 'Ungrouped';
        const container = getOrCreateGroupContainer(sectionName, groupName);

        const desc = item.description || '';

        btn.type = 'button';
        btn.textContent = title;
        btn.dataset.title = title;
        btn.dataset.originalText = title;
        btn.dataset.desc = desc;
        btn.dataset.severity = item.severity || 'Low';
        btn.dataset.escalation = boolToYesNo(item.escalation);
        btn.dataset.refund = boolToYesNo(item.refund);
        btn.dataset.img = item.img || '';
        btn.dataset.scripts = item.scripts || '';
        btn.dataset.caseId = item.id || `supa-${Date.now()}-${secureRandomInt()}`;

        btn.addEventListener('click', () => openCaseFromButton(btn));

        container.appendChild(btn);
        supaButtons.push(btn);
      });

      refreshDynamicButtons();
      refreshDynamicGroups();
      renderQuickAccess();
      renderRecentCases();
      if (typeof filterKnowledgeBase === 'function') {
        filterKnowledgeBase();
      }
    } catch (e) {
      console.error('Supabase load failed:', e);
      alert(`Supabase load failed: ${e.message}`);
    }
  }

  // --- End Supabase: Load cases from Supabase ---

  async function loginWithSupabase(username, password) {
    const attempt=NewTelLoginGuard.canAttempt('himma_agent');
    if(!attempt.allowed)return {success:false,message:attempt.message};
    const { data, error } = await supabaseClient
      .from('trainer_users')
      .select('id,full_name,username,role,active')
      .eq('username', username)
      .eq('password', password)
      .eq('active', true)
      .maybeSingle();

    if (error) {
      throw new Error('Supabase error: ' + error.message);
    }

    if (!data) {
      const failure=NewTelLoginGuard.registerFailure('himma_agent');
      return { success: false, message: failure.message || 'Wrong username or password' };
    }

    if (!AGENT_ALLOWED_ROLES.has(data.role)) {
      return { success: false, message: 'This user is not allowed to open Agent page' };
    }

    NewTelLoginGuard.reset('himma_agent');
    return {
      success: true,
      agentName: data.full_name || data.username,
      username: data.username,
      role: data.role
    };
  }

  async function checkForceRefreshFromAdmin() {
    try {
      const { data, error } = await supabaseClient
        .from('app_control')
        .select('value')
        .eq('key', APP_CONTROL_FORCE_REFRESH_KEY)
        .maybeSingle();

      if (error || !data?.value) return;

      const oldValue = localStorage.getItem(APP_CONTROL_FORCE_REFRESH_STORAGE_KEY);

      // Ignore refresh signals created before this page session began.
      if (!forceRefreshBaselineReady) {
        forceRefreshBaselineReady = true;
        localStorage.setItem(APP_CONTROL_FORCE_REFRESH_STORAGE_KEY, data.value);
        return;
      }

      if (!oldValue) {
        localStorage.setItem(APP_CONTROL_FORCE_REFRESH_STORAGE_KEY, data.value);
        return;
      }

      if (oldValue !== data.value) {
        localStorage.setItem(APP_CONTROL_FORCE_REFRESH_STORAGE_KEY, data.value);
        logoutAgent({ showLogin: true });
      }
    } catch (error) {
      console.warn('Force refresh check failed:', error);
    }
  }

  async function checkSingleUserLogoutSignal() {
    const username = getSavedAgentUsername();
    if (!username) return;

    try {
      const { data, error } = await supabaseClient
        .from('app_control')
        .select('value')
        .eq('key', 'logout_user_' + username)
        .maybeSingle();

      if (error || !data?.value) return;

      const storageKey = APP_CONTROL_USER_LOGOUT_PREFIX + username;
      const oldValue = localStorage.getItem(storageKey);

      if (!oldValue) {
        localStorage.setItem(storageKey, data.value);
        return;
      }

      if (oldValue !== data.value) {
        localStorage.setItem(storageKey, data.value);
        logoutAgent({ showLogin: true });
      }
    } catch (error) {
      console.warn('Single user logout check failed:', error);
    }
  }

  async function checkAgentAccountStillAllowed() {
    const username = getSavedAgentUsername();
    if (!username) return;

    try {
      const { data, error } = await supabaseClient
        .from('trainer_users')
        .select('username,role,active')
        .eq('username', username)
        .maybeSingle();

      if (error) return;

      if (!data || data.active !== true || !AGENT_ALLOWED_ROLES.has(data.role)) {
        logoutAgent({ showLogin: true });
      }
    } catch (error) {
      console.warn('Agent account active check failed:', error);
    }
  }

    checkForceRefreshFromAdmin();
    checkSingleUserLogoutSignal();

    setInterval(checkForceRefreshFromAdmin, APP_CONTROL_CHECK_INTERVAL);
    setInterval(checkSingleUserLogoutSignal, APP_CONTROL_CHECK_INTERVAL);
    setInterval(checkAgentAccountStillAllowed, APP_CONTROL_CHECK_INTERVAL);

  async function completeAgentLogin() {
    const name = agentLoginInput.value.trim();
    const password = agentPasswordInput.value.trim();

    loginError.classList.remove('show');
    loginError.textContent = '';

    if (!name || !password) {
      loginError.textContent = 'Please enter Agent Name and Password';
      loginError.classList.add('show');
      if (!name) {
        agentLoginInput.focus();
      } else {
        agentPasswordInput.focus();
      }
      return;
    }

    agentLoginBtn.disabled = true;
    agentLoginBtn.textContent = 'Checking...';

    try {
      const result = await loginWithSupabase(name, password);

      if (!result.success) {
        loginError.textContent = result.message || JSON.stringify(result) || 'Wrong username or password';
        loginError.classList.add('show');
        console.log('Agent login result:', result);
        agentPasswordInput.value = '';
        agentPasswordInput.focus();
        return;
      }

      const verifiedName = result.agentName || name;
      localStorage.setItem(AGENT_USERNAME_STORAGE_KEY, result.username || name);
      localStorage.setItem(AGENT_ROLE_STORAGE_KEY, result.role || 'agent');
      localStorage.removeItem(APP_CONTROL_USER_LOGOUT_PREFIX + (result.username || name));
      saveAgentName(verifiedName);
      updateAgentDisplay();
      agentLoginInput.value = verifiedName;
      agentPasswordInput.value = '';
      agentLoginOverlay.classList.remove('show');
    } catch (error) {
      console.error('Agent login failed:', error);
      loginError.textContent = error.message || 'Login Server Error';
      loginError.classList.add('show');
    } finally {
      agentLoginBtn.disabled = false;
      agentLoginBtn.textContent = 'Login';
    }
  }

  async function copyTextToClipboard(text) {
    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(text);
      return;
    }

    const textarea = document.createElement('textarea');
    textarea.value = text;
    textarea.style.position = 'fixed';
    textarea.style.opacity = '0';
    document.body.appendChild(textarea);
    textarea.focus();
    textarea.select();
    document.execCommand('copy');
    textarea.remove();
  }

      const card = document.createElement('button');

      text.className = 'script-card-text';
      text.textContent = scriptText;

      card.appendChild(title);

  function clearHighlights() {
    actionButtons.forEach((button) => {
      if (button.dataset.originalText) {

    });
  }

  function highlightButtonText(button, query) {
if (query === '') return;
    if (!button.dataset.originalText) {
      button.dataset.originalText = button.textContent.trim();
    }

    const original = button.dataset.originalText;
    const normalizedOriginal = normalizeText(original);
    const index = normalizedOriginal.indexOf(query);

    if (index === -1) {
      button.textContent = original;
      return;
    }

    const before = original.slice(0, index);
    const match = original.slice(index, index + query.length);
    const after = original.slice(index + query.length);
    button.innerHTML = `${before}<mark class="search-highlight">${match}</mark>${after}`;
  }
  function normalizeText(text) {
    return (text || '')
      .toLowerCase()
      .replace(/[أإآ]/g, 'ا')
      .replace(/ى/g, 'ي')
      .replace(/ة/g, 'ه')
      .replace(/[ًٌٍَُِّْ]/g, '')
      .trim();
  }

  function getButtonSearchText(button) {
    return [
      button.textContent,
      button.dataset.title,
      button.dataset.desc
    ].join(' ');
  }

  function filterKnowledgeBase() {
    const query = normalizeText(searchInput.value);
    refreshDynamicButtons();
    refreshDynamicGroups();
    clearHighlights();
    let anyResult = false;

    groupBoxes.forEach((group) => {
      group.classList.remove('hidden-by-search', 'search-open');
    });

    actionButtons.forEach((button) => {
      button.classList.remove('hidden-by-search');
    });

    document.querySelectorAll('.empty-state').forEach((emptyState) => {
      emptyState.classList.remove('hidden-by-search');
    });

    sections.forEach((section) => {
      section.classList.remove('hidden-by-search');
    });

    if (query === '') {
      noResults.classList.remove('show');
      clearHighlights();
      return;
    }

    sections.forEach((section) => {
      let sectionHasResult = false;
      const sectionTitle = normalizeText(section.querySelector('h2')?.textContent || '');

      section.querySelectorAll(':scope > .empty-box > .action-btn').forEach((button) => {
        const buttonText = normalizeText(getButtonSearchText(button));
        const buttonMatches = buttonText.includes(query) || sectionTitle.includes(query);

        if (buttonMatches) {
          button.classList.remove('hidden-by-search');
          highlightButtonText(button, query);
          sectionHasResult = true;
          anyResult = true;
        } else {
          button.classList.add('hidden-by-search');
        }
      });

      section.querySelectorAll('.group-box').forEach((group) => {
        const groupTitle = normalizeText(group.querySelector('.group-btn')?.textContent || '');
        const groupMatches = groupTitle.includes(query) || query.includes(groupTitle);
        let groupHasResult = groupMatches || sectionTitle.includes(query);

        group.querySelectorAll('.action-btn').forEach((button) => {
          const buttonText = normalizeText(getButtonSearchText(button));
          const buttonMatches = buttonText.includes(query);

          if (buttonMatches || groupMatches || sectionTitle.includes(query)) {
            button.classList.remove('hidden-by-search');
            highlightButtonText(button, query);
            groupHasResult = true;
          } else {
            button.classList.add('hidden-by-search');
          }
        });

        group.querySelectorAll('.empty-state').forEach((emptyState) => {
          const emptyText = normalizeText(emptyState.textContent);
          const emptyMatches = emptyText.includes(query) || groupMatches || sectionTitle.includes(query);

          if (emptyMatches) {
            emptyState.classList.remove('hidden-by-search');
            groupHasResult = true;
          } else {
            emptyState.classList.add('hidden-by-search');
          }
        });

        if (groupHasResult) {
          group.classList.remove('hidden-by-search');
          group.classList.add('search-open');
          sectionHasResult = true;
          anyResult = true;
        } else {
          group.classList.add('hidden-by-search');
        }
      });

      if (sectionHasResult) {
        section.classList.remove('hidden-by-search');
      } else {
        section.classList.add('hidden-by-search');
      }
    });

    if (anyResult) {
      noResults.classList.remove('show');
    } else {
      noResults.classList.add('show');
    }
  }

  function buildPopupCards(description, severity = 'Low', escalation = 'No', refund = 'No') {
    const cleanDescription = description.replaceAll('\\n', '\n');
    const lines = cleanDescription
      .split('\n')
      .map(line => line.trim())
      .filter(line => line !== '');

    let html = '';
    const severityClass = `severity-${severity.toLowerCase()}`;
    const escalationClass = escalation.toLowerCase() === 'yes' ? 'escalation-yes' : 'escalation-no';
    const refundClass = refund.toLowerCase() === 'yes' ? 'refund-yes' : 'refund-no';

    html += `
      <div class="case-meta-row">
        <span class="severity-badge ${severityClass}">Priority: ${severity}</span>
        <span class="escalation-badge ${escalationClass}">Escalation: ${escalation}</span>
        <span class="refund-badge ${refundClass}">Refund: ${refund}</span>
      </div>

      <div class="info-card">
        <span class="info-card-title">Was this case helpful?</span>
        <div class="feedback-row">
          <button class="feedback-btn like" id="caseLikeBtn" type="button">✅ Helpful</button>
          <button class="feedback-btn dislike" id="caseDislikeBtn" type="button">⚠️ Needs Fix</button>
        </div>
        <div class="feedback-form" id="feedbackForm">
          <textarea id="feedbackText" placeholder="اكتب ملاحظتك: شو الغلط أو شو لازم يتعدل؟"></textarea>
          <button class="feedback-submit" id="submitFeedback" type="button">Save Feedback</button>
        </div>
        <div class="feedback-message" id="feedbackMessage">Thanks, feedback saved.</div>
      </div>
    `;

    lines.forEach((line) => {
      if (line.startsWith('المشكلة:')) {
        html += `
          <div class="info-card issue-card">
            <span class="info-card-title">المشكلة</span>
            ${line.replace('المشكلة:', '').trim()}
          </div>
        `;
      } else if (/^\d+\./.test(line)) {
        const stepNumber = line.match(/^\d+/)[0];
        const stepText = line.replace(/^\d+\.\s*/, '');
        html += `
          <div class="info-card step-card">
            <span class="info-card-title">الخطوة ${stepNumber}</span>
            ${stepText}
          </div>
        `;
      } else if (line.startsWith('رد مقترح:')) {
        const replyText = line.replace('رد مقترح:', '').trim();
        html += `
          <div class="info-card reply-card">
            <span class="info-card-title">رد مقترح</span>
            <div class="reply-copy-text">${replyText}</div>
            <button class="copy-reply-btn" type="button" data-reply="${encodeURIComponent(replyText)}">Copy Reply</button>
          </div>
        `;
      } else if (!line.includes('خطوات التعامل')) {
        html += `
          <div class="info-card">
            ${line}
          </div>
        `;
      }
    });

    return html || '<div class="info-card">لا يوجد شرح مضاف لهذا الزر.</div>';
  }

  popupDesc.addEventListener('click', async (event) => {
    const copyBtn = event.target.closest('.copy-reply-btn');
    if (!copyBtn) return;

    const replyText = decodeURIComponent(copyBtn.dataset.reply || '');
    if (!replyText) return;

    try {
      await navigator.clipboard.writeText(replyText);
    } catch (error) {
      const tempInput = document.createElement('textarea');
      tempInput.value = replyText;
      document.body.appendChild(tempInput);
      tempInput.select();
      document.execCommand('copy');
      document.body.removeChild(tempInput);
    }

    copyBtn.textContent = 'Copied';
    setTimeout(() => {
      copyBtn.textContent = 'Copy Reply';
    }, 1200);
  });

  actionButtons.forEach((button) => {
    button.addEventListener('click', () => {
      openCaseFromButton(button);
    });
  });

  closePopup.addEventListener('click', () => {
    popupOverlay.classList.remove('active');
  });

  popupOverlay.addEventListener('click', (event) => {
    if (event.target === popupOverlay) {
      popupOverlay.classList.remove('active');
    }
  });

  document.addEventListener('keydown', (event) => {
    if (event.key === 'Escape') {
      popupOverlay.classList.remove('active');
    }
  });
</script>
<script>
  window.TRACKING_PROJECT = "himma";
</script>
<script src="tracking.js?v=15"></script>
